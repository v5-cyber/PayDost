<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayVlt — Professional Payment Vault</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .hidden { display: none !important; }
    #auth-screen { min-height: 100vh; background: #0F172A; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
    .auth-card { background: #1E293B; padding: 40px; border-radius: 16px; width: 400px; border: 1px solid rgba(255,255,255,0.1); }
    .auth-tabs { display: flex; gap: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 24px; }
    .auth-tab { background: none; border: none; color: #64748B; padding: 10px 0; cursor: pointer; font-weight: 600; font-size: 16px; }
    .auth-tab.active { color: white !important; border-bottom: 2px solid #028090 !important; }
    .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, #028090, #1A56A0); border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div style="text-align:center; margin-bottom:32px;">
      <h1 style="margin:0;">💰 PayVlt</h1>
      <p style="color:#028090; font-size:12px; font-weight:700;">APKA PAYMENT PARTNER</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="t-login" onclick="switchT('login')">Login</button>
      <button class="auth-tab" id="t-reg" onclick="switchT('reg')">Register</button>
    </div>

    <div id="f-login">
      <div style="margin-bottom:15px;"><label>Email</label><input type="email" id="l-email" placeholder="aapki@email.com" style="width:100%; padding:10px; background:#0D1B3E; border:1px solid #334466; color:white; border-radius:8px;" /></div>
      <div style="margin-bottom:15px;"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••" style="width:100%; padding:10px; background:#0D1B3E; border:1px solid #334466; color:white; border-radius:8px;" /></div>
      <button class="btn-primary" id="b-login" onclick="runAuth('login')">Login to PayVlt</button>
      <p style="text-align:center; margin-top:12px; font-size:12px; color:#10B981;">30 din free — no credit card</p>
    </div>

    <div id="f-reg" class="hidden">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
        <div><label>Name</label><input type="text" id="r-name" style="width:100%; padding:10px; background:#0D1B3E; border:1px solid #334466; color:white; border-radius:8px;" /></div>
        <div><label>Company</label><input type="text" id="r-comp" style="width:100%; padding:10px; background:#0D1B3E; border:1px solid #334466; color:white; border-radius:8px;" /></div>
      </div>
      <div style="margin-bottom:15px;"><label>Email</label><input type="email" id="r-email" placeholder="aapki@email.com" style="width:100%; padding:10px; background:#0D1B3E; border:1px solid #334466; color:white; border-radius:8px;" /></div>
      <div style="margin-bottom:15px;"><label>Password</label><input type="password" id="r-pass" placeholder="••••••••" style="width:100%; padding:10px; background:#0D1B3E; border:1px solid #334466; color:white; border-radius:8px;" /></div>
      <button class="btn-primary" id="b-reg" onclick="runAuth('reg')">Create Free Account</button>
    </div>
  </div>
</div>

<div id="app" class="hidden" style="padding:40px;">
  <h1>Welcome to PayVlt Dashboard</h1>
  <div id="user-info"></div>
  <button onclick="runAuth('logout')" style="margin-top:20px;">Logout</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // 🛡️ ISOLATED LOGIC — No dependencies on app.js
  const URL = "https://jwtjnrbwwjwtaukaoeda.supabase.co";
  const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3dGpucmJ3d2p3dGF1a2FvZWRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTE0ODEsImV4cCI6MjA5MjU4NzQ4MX0.diAAnRtaTCw9BvHMW3AFE2l4d_B9er2yRLN5sYLdawo";
  const sb = window.supabase.createClient(URL, KEY);

  function switchT(t) {
    const isL = t === 'login';
    document.getElementById('f-login').classList.toggle('hidden', !isL);
    document.getElementById('f-reg').classList.toggle('hidden', isL);
    document.getElementById('t-login').classList.toggle('active', isL);
    document.getElementById('t-reg').classList.toggle('active', !isL);
  }

  async function runAuth(type) {
    if (type === 'logout') { await sb.auth.signOut(); return location.reload(); }
    
    const isL = type === 'login';
    const btn = document.getElementById(isL ? 'b-login' : 'b-reg');
    const old = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span> Working...`;

    try {
      let r;
      if (isL) {
        r = await sb.auth.signInWithPassword({ email: document.getElementById('l-email').value, password: document.getElementById('l-pass').value });
      } else {
        r = await sb.auth.signUp({ 
          email: document.getElementById('r-email').value, 
          password: document.getElementById('r-pass').value,
          options: { data: { full_name: document.getElementById('r-name').value, company_name: document.getElementById('r-comp').value } }
        });
      }

      if (r.error) {
        alert(isL ? "Email ya password galat hai." : r.error.message);
        btn.disabled = false; btn.innerHTML = old;
      }
    } catch (e) {
      alert("Connection Problem");
      btn.disabled = false; btn.innerHTML = old;
    }
  }

  sb.auth.onAuthStateChange((ev, sess) => {
    if (sess) {
      document.getElementById('auth-screen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      document.getElementById('user-info').textContent = "Logged in as: " + sess.user.email;
    }
  });

  window.onload = () => {
    const p = new URLSearchParams(window.location.search);
    if (p.get('register') === 'true') switchT('reg');
  };
</script>
</body>
</html>
