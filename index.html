<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayVlt — Professional Payment Partner</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .hidden { display: none !important; }
    .auth-tab.active { color: #fff !important; border-bottom: 2px solid #028090 !important; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ══════════════ AUTH SCREEN ══════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div style="text-align:center; margin-bottom:32px;">
      <h1 style="margin:0; font-size:32px;">💰 PayVlt</h1>
      <p style="color:#028090; font-size:12px; font-weight:700; margin-top:4px;">APKA PAYMENT PARTNER</p>
    </div>

    <div class="auth-tabs" style="display:flex; gap:24px; border-bottom:1px solid rgba(255,255,255,0.1); margin-bottom:24px;">
      <button class="auth-tab active" id="tab-login" onclick="setTab('login')" style="background:none; border:none; color:#64748B; padding:10px 0; cursor:pointer; font-weight:600; font-size:16px;">Login</button>
      <button class="auth-tab" id="tab-reg" onclick="setTab('reg')" style="background:none; border:none; color:#64748B; padding:10px 0; cursor:pointer; font-weight:600; font-size:16px;">Register</button>
    </div>

    <!-- Login -->
    <div id="form-login">
      <div class="form-group"><label>Email Address</label><input type="email" id="l-email" placeholder="aapki@email.com" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••" /></div>
      <button class="btn-primary" id="btn-login" onclick="doAuth('login')">Login to PayVlt</button>
      <p style="text-align:center; margin-top:16px; font-size:12px; color:#10B981; font-weight:700;">30 din free — no credit card</p>
    </div>

    <!-- Register -->
    <div id="form-reg" class="hidden">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:15px;">
        <div><label>Full Name</label><input type="text" id="r-name" /></div>
        <div><label>Company</label><input type="text" id="r-comp" /></div>
      </div>
      <div class="form-group"><label>Email Address</label><input type="email" id="r-email" placeholder="aapki@email.com" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="r-pass" placeholder="••••••••" /></div>
      <button class="btn-primary" id="btn-register" onclick="doAuth('reg')">Create Free Account</button>
    </div>
  </div>
</div>

<!-- ══════════════ MAIN APP ══════════════ -->
<div id="app" class="hidden">
  <aside id="sidebar">
    <div class="sidebar-logo">💰 PayVlt</div>
    <nav class="nav-links">
      <button class="nav-item active" id="nav-dashboard" onclick="navigate('dashboard')">📊 Dashboard</button>
      <button class="nav-item" id="nav-projects" onclick="navigate('projects')">📁 Projects</button>
    </nav>
    <div style="padding:24px; border-top:1px solid rgba(255,255,255,0.1);">
      <div id="sidebar-name" style="font-weight:700; color:white; margin-bottom:12px;">My Company</div>
      <button onclick="doAuth('logout')" style="width:100%; padding:8px; border-radius:6px; background:none; border:1px solid #334466; color:#94A3B8; cursor:pointer;">Logout</button>
    </div>
  </aside>

  <main id="main">
    <div id="alert-area"></div>
    <div id="page-dashboard" class="page-content">
      <div style="margin-bottom:32px;"><h2>Dashboard</h2></div>
      <div id="stats-grid" class="stats-grid"></div>
    </div>
    <div id="page-projects" class="page-content hidden">
      <div style="margin-bottom:32px;"><h2>Projects</h2></div>
      <div id="projects-grid" class="projects-grid"></div>
    </div>
  </main>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 🧠 BRAIN OF THE APP 🧠 -->
<script>
  const S_URL = "https://jwtjnrbwwjwtaukaoeda.supabase.co";
  const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3dGpucmJ3d2p3dGF1a2FvZWRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTE0ODEsImV4cCI6MjA5MjU4NzQ4MX0.diAAnRtaTCw9BvHMW3AFE2l4d_B9er2yRLN5sYLdawo";
  const sb = window.supabase.createClient(S_URL, S_KEY);

  // ── TAB LOGIC (Hard-coded for 100% Reliability) ──
  function setTab(t) {
    const isL = t === 'login';
    document.getElementById('form-login').classList.toggle('hidden', !isL);
    document.getElementById('form-reg').classList.toggle('hidden', isL);
    document.getElementById('tab-login').classList.toggle('active', isL);
    document.getElementById('tab-reg').classList.toggle('active', !isL);
  }

  // ── AUTH LOGIC ──
  async function doAuth(type) {
    if (type === 'logout') {
      await sb.auth.signOut();
      return location.reload();
    }

    const isL = type === 'login';
    const btn = document.getElementById(isL ? 'btn-login' : 'btn-register');
    const oldText = btn.innerHTML;
    
    // Set Loading
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span> Working...`;

    try {
      let res;
      if (isL) {
        res = await sb.auth.signInWithPassword({ 
          email: document.getElementById('l-email').value, 
          password: document.getElementById('l-pass').value 
        });
      } else {
        res = await sb.auth.signUp({ 
          email: document.getElementById('r-email').value, 
          password: document.getElementById('r-pass').value,
          options: { data: { 
            full_name: document.getElementById('r-name').value, 
            company_name: document.getElementById('r-comp').value 
          } }
        });
      }

      if (res.error) {
        alert(isL ? "Email ya password galat hai." : res.error.message);
        btn.disabled = false;
        btn.innerHTML = oldText;
      }
    } catch (err) {
      alert("Connection Problem. Please try again.");
      btn.disabled = false;
      btn.innerHTML = oldText;
    }
  }

  // ── SESSION WATCHER ──
  sb.auth.onAuthStateChange((ev, sess) => {
    if (sess) {
      document.getElementById('auth-screen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      document.getElementById('sidebar-name').textContent = sess.user.user_metadata.company_name || "My Company";
    }
  });

  // Handle ?register=true URL
  window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    if (params.get('register') === 'true') setTab('reg');
  };
</script>
</body>
</html>
