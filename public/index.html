<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayDost — Apka Payment Partner</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>" />
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ══════════════ AUTH SCREEN ══════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <p class="subtitle">💰 PAYDOST</p>
      <h1>💰 PayDost</h1>
      <p class="muted">Apka Payment Partner — Track | Invoice | Remind | Collect</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-btn-login" onclick="showAuthTab('login')">Login</button>
      <button class="auth-tab" id="tab-btn-register" onclick="showAuthTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div id="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="aapki@email.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <button class="btn-primary btn-block" onclick="authAction('login')">Login to PayDost</button>
      <div class="auth-footer"><p class="promo-text">30 din free — koi credit card nahi</p></div>
    </div>

    <!-- Register Form -->
    <div id="register-form" class="hidden">
      <div class="form-group"><label>Full Name</label><input type="text" id="reg-name" placeholder="Ramesh Kumar" /></div>
      <div class="form-group"><label>Company</label><input type="text" id="reg-company" placeholder="Kumar Contractors" /></div>
      <div class="form-group"><label>Email Address</label><input type="email" id="reg-email" placeholder="aapki@email.com" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="reg-password" placeholder="Min 6 characters" /></div>
      <button class="btn-primary btn-block" onclick="authAction('register')">Create Free Account</button>
    </div>
  </div>
</div>

<!-- ══════════════ MAIN APP ══════════════ -->
<div id="app" class="hidden">
  <aside id="sidebar">
    <div class="sidebar-logo"><h1>💰 PayDost</h1></div>
    <nav class="nav-links">
      <button class="nav-item active" data-page="dashboard" onclick="App.navigate('dashboard')">📊 Dashboard</button>
      <button class="nav-item" data-page="projects" onclick="App.navigate('projects')">📁 Projects</button>
      <button class="nav-item" data-page="payments" onclick="App.navigate('payments')">💳 Payments</button>
      <button class="nav-item" data-page="tally" onclick="App.navigate('tally')">📈 Tally</button>
      <button class="nav-item" data-page="diary" onclick="App.navigate('diary')">📔 Site Diary</button>
      <button class="nav-item" data-page="settings" onclick="App.navigate('settings')">⚙️ Settings</button>
    </nav>
    <div style="padding:20px; border-top:1px solid var(--border);">
      <div id="sidebar-name" style="font-weight:700;">Loading...</div>
      <button onclick="authAction('logout')" style="margin-top:10px; width:100%; cursor:pointer;">Logout</button>
    </div>
  </aside>
  <div id="main">
    <div class="top-bar"><h2 id="page-title">Dashboard</h2></div>
    <div id="page-dashboard" class="page-content">
      <div id="stats-grid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px;"></div>
    </div>
  </div>
</div>

<script>
// ── SUPABASE CONFIG ──
const SB_URL = "https://jwtjnrbwwjwtaukaoeda.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3dGpucmJ3d2p3dGF1a2FvZWRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTE0ODEsImV4cCI6MjA5MjU4NzQ4MX0.diAAnRtaTCw9BvHMW3AFE2l4d_B9er2yRLN5sYLdawo";
const supabase = window.supabase.createClient(SB_URL, SB_KEY);

// ── AUTH LOGIC ──
async function authAction(type) {
  if (type === 'login') {
    const email = document.getElementById('login-email').value;
    const pass = document.getElementById('login-password').value;
    const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
    if(error) alert("Error: " + error.message);
  } 
  else if (type === 'register') {
    const email = document.getElementById('reg-email').value;
    const pass = document.getElementById('reg-password').value;
    const name = document.getElementById('reg-name').value;
    const company = document.getElementById('reg-company').value;
    const { error } = await supabase.auth.signUp({ email, password: pass, options: { data: { full_name: name, company_name: company } } });
    if(error) alert("Error: " + error.message);
    else alert("Success! Check your dashboard.");
  }
  else if (type === 'logout') {
    await supabase.auth.signOut();
    location.reload();
  }
}

// ── UI LOGIC ──
function showAuthTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('login-form').classList.toggle('hidden', !isLogin);
  document.getElementById('register-form').classList.toggle('hidden', isLogin);
  document.getElementById('tab-btn-login').classList.toggle('active', isLogin);
  document.getElementById('tab-btn-register').classList.toggle('active', !isLogin);
}

// Session Check
supabase.auth.onAuthStateChange((event, session) => {
  if (session) {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('sidebar-name').textContent = session.user.user_metadata.company_name || "My Company";
    if(window.App && window.App.init) window.App.init();
  } else {
    document.getElementById('auth-screen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
  }
});
</script>

<!-- Other scripts -->
<script src="/app.js"></script>
<script src="/app2.js"></script>
<script src="/app4.js"></script>
</body>
</html>
