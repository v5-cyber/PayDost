<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayVlt — Professional Payment Partner</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .hidden { display: none !important; }
    #auth-screen { min-height: 100vh; background: #0F172A; display: flex; align-items: center; justify-content: center; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ══════════════ AUTH SCREEN ══════════════ -->
<div id="auth-screen">
  <div class="auth-card" style="background: #1E293B; padding: 40px; border-radius: 16px; width: 400px; border-top: 4px solid #028090;">
    <div style="text-align:center; margin-bottom:32px;">
      <h1 style="margin:0; font-size:32px;">💰 PayVlt</h1>
      <p style="color:#028090; font-size:12px; font-weight:700; margin-top:4px;">APKA PAYMENT PARTNER</p>
    </div>

    <div class="auth-tabs" style="display:flex; gap:20px; border-bottom:1px solid rgba(255,255,255,0.1); margin-bottom:24px;">
      <button class="auth-tab active" id="t-login" onclick="switchT('login')" style="background:none; border:none; color:white; padding:10px 0; cursor:pointer; font-weight:600;">Login</button>
      <button class="auth-tab" id="t-reg" onclick="switchT('reg')" style="background:none; border:none; color:#64748B; padding:10px 0; cursor:pointer; font-weight:600;">Register</button>
    </div>

    <div id="f-login">
      <div class="form-group"><label>Email Address</label><input type="email" id="l-email" placeholder="aapki@email.com" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••" /></div>
      <button class="btn-primary" id="b-login" onclick="runAuth('login')">Login to PayVlt</button>
      <p style="text-align:center; margin-top:16px; font-size:12px; color:#10B981; font-weight:700;">30 din free — no credit card</p>
    </div>

    <div id="f-reg" class="hidden">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:15px;">
        <div><label>Name</label><input type="text" id="r-name" /></div>
        <div><label>Company</label><input type="text" id="r-comp" /></div>
      </div>
      <div class="form-group"><label>Email Address</label><input type="email" id="r-email" placeholder="aapki@email.com" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="r-pass" placeholder="••••••••" /></div>
      <button class="btn-primary" id="b-reg" onclick="runAuth('reg')">Create Free Account</button>
    </div>
  </div>
</div>

<!-- ══════════════ MAIN APP ══════════════ -->
<div id="app" class="hidden">
  <aside id="sidebar">
    <div class="sidebar-logo">💰 PayVlt</div>
    <nav class="nav-links">
      <button class="nav-item active" id="nav-dashboard" onclick="navigate('dashboard')">📊 Dashboard</button>
      <button class="nav-item" id="nav-projects" onclick="navigate('projects')">📁 Projects</button>
    </nav>
    <div style="padding:24px; border-top:1px solid rgba(255,255,255,0.1); margin-top:auto;">
      <div id="sidebar-name" style="font-weight:700; color:white; margin-bottom:12px;">My Company</div>
      <button onclick="runAuth('logout')" style="width:100%; padding:8px; border-radius:6px; background:none; border:1px solid #334466; color:#94A3B8; cursor:pointer;">Logout</button>
    </div>
  </aside>

  <main id="main">
    <div id="alert-area"></div>
    <div id="page-dashboard" class="page-content">
      <div style="margin-bottom:32px;"><h2>Dashboard</h2></div>
      <div id="stats-grid" class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total Projects</div><div id="stat-count" class="stat-value">0</div></div>
        <div class="stat-card"><div class="stat-label">Total Collected</div><div id="stat-collected" class="stat-value">₹0</div></div>
        <div class="stat-card"><div class="stat-label">Collection Rate</div><div id="stat-rate" class="stat-value">0%</div></div>
      </div>
    </div>
    <div id="page-projects" class="page-content hidden">
      <div style="display:flex; justify-content:space-between; margin-bottom:32px;">
        <h2>Projects</h2>
        <button class="btn-primary" style="width:auto; padding: 10px 20px;">+ New Project</button>
      </div>
      <div id="projects-grid" class="projects-grid"></div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const U = "https://jwtjnrbwwjwtaukaoeda.supabase.co";
  const K = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3dGpucmJ3d2p3dGF1a2FvZWRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTE0ODEsImV4cCI6MjA5MjU4NzQ4MX0.diAAnRtaTCw9BvHMW3AFE2l4d_B9er2yRLN5sYLdawo";
  let sb;
  function getSB() { if (!sb) sb = window.supabase.createClient(U, K); return sb; }

  function switchT(t) {
    const isL = t === 'login';
    document.getElementById('f-login').classList.toggle('hidden', !isL);
    document.getElementById('f-reg').classList.toggle('hidden', isL);
    document.getElementById('t-login').classList.toggle('active', isL);
    document.getElementById('t-reg').classList.toggle('active', !isL);
  }

  async function runAuth(type) {
    const client = getSB();
    if (type === 'logout') { await client.auth.signOut(); return location.reload(); }
    const isL = type === 'login';
    const btn = document.getElementById(isL ? 'b-login' : 'b-reg');
    const old = btn.innerHTML;
    btn.disabled = true; btn.innerHTML = `<span class="spinner"></span> Working...`;
    try {
      let r;
      if (isL) { r = await client.auth.signInWithPassword({ email: document.getElementById('l-email').value, password: document.getElementById('l-pass').value }); }
      else { r = await client.auth.signUp({ email: document.getElementById('r-email').value, password: document.getElementById('r-pass').value, options: { data: { full_name: document.getElementById('r-name').value, company_name: document.getElementById('r-comp').value } } }); }
      if (r.error) { alert(isL ? "Email ya password galat hai." : r.error.message); btn.disabled = false; btn.innerHTML = old; }
    } catch (e) { alert("Error: " + e.message); btn.disabled = false; btn.innerHTML = old; }
  }

  function navigate(page) {
    document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
    document.getElementById('page-' + page).classList.remove('hidden');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('nav-' + page).classList.add('active');
    if(page === 'dashboard') loadData();
  }

  async function loadData() {
    const client = getSB();
    const { data: projects } = await client.from('projects').select('*');
    if (projects) {
      document.getElementById('stat-count').textContent = projects.length;
      let total = 0;
      projects.forEach(p => total += (p.collected_amount || 0));
      document.getElementById('stat-collected').textContent = '₹' + total.toLocaleString('en-IN');
      document.getElementById('stat-rate').textContent = projects.length > 0 ? "85%" : "0%";
    }
  }

  window.onload = () => {
    const client = getSB();
    client.auth.onAuthStateChange((ev, sess) => {
      if (sess) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('sidebar-name').textContent = sess.user.user_metadata.company_name || "My Company";
        loadData();
      }
    });
    const p = new URLSearchParams(window.location.search);
    if (p.get('register') === 'true') switchT('reg');
  };
</script>
</body>
</html>
