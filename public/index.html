<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayDost — Apka Payment Partner</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ══════════════ AUTH SCREEN ══════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>💰 PayDost</h1>
      <p>Apka Payment Partner</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-btn-login" onclick="showAuthTab('login')">Login</button>
      <button class="auth-tab" id="tab-btn-register" onclick="showAuthTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div id="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="email@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <button class="btn-primary btn-block" onclick="App.auth.login()">Login to PayDost</button>
      <p style="text-align:center; margin-top:20px; font-size:12px; color:var(--text-dim);">30 din free — koi credit card nahi</p>
    </div>

    <!-- Register Form -->
    <div id="register-form" class="hidden">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div class="form-group"><label>Full Name</label><input type="text" id="reg-name" /></div>
        <div class="form-group"><label>Company</label><input type="text" id="reg-company" /></div>
      </div>
      <div class="form-group"><label>Email Address</label><input type="email" id="reg-email" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="reg-password" /></div>
      <button class="btn-primary btn-block" onclick="App.auth.register()">Create Free Account</button>
    </div>
  </div>
</div>

<!-- ══════════════ MAIN APP ══════════════ -->
<div id="app" class="hidden">
  <aside id="sidebar">
    <div class="sidebar-logo"><h1>💰 PayDost</h1></div>
    <nav class="nav-links">
      <button class="nav-item active" data-page="dashboard" onclick="App.navigate('dashboard')">📊 Dashboard</button>
      <button class="nav-item" data-page="projects" onclick="App.navigate('projects')">📁 Projects</button>
      <button class="nav-item" data-page="payments" onclick="App.navigate('payments')">💳 Payments</button>
      <button class="nav-item" data-page="settings" onclick="App.navigate('settings')">⚙️ Settings</button>
    </nav>
    <div style="padding:20px; border-top:1px solid var(--border);">
      <button onclick="App.auth.logout()" style="width:100%; cursor:pointer;">Logout</button>
    </div>
  </aside>
  <div id="main">
    <div class="top-bar"><h2>Dashboard</h2></div>
    <div id="page-dashboard" class="page-content">
      <div id="stats-grid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px;"></div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="/app.js"></script>
<script src="/app2.js"></script>
<script src="/app4.js"></script>
</body>
</html>
