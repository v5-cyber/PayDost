<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayDost — Apka Payment Partner</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>" />
</head>
<body>

<!-- ══════════════ AUTH SCREEN ══════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <p class="subtitle">💰 PAYDOST</p>
      <h1>💰 PayDost</h1>
      <p class="muted">Apka Payment Partner — Track | Invoice | Remind | Collect</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-btn-login" onclick="showAuthTab('login')">Login</button>
      <button class="auth-tab" id="tab-btn-register" onclick="showAuthTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div id="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <input type="email" id="login-email" placeholder="aapki@email.com" />
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
      </div>
      <button class="btn-primary btn-block" onclick="App.auth.login()">Login to PayDost</button>
      
      <div class="auth-footer">
        <a href="#" onclick="App.auth.forgotPass()">Forgot password?</a>
        <p class="promo-text">30 din free — koi credit card nahi</p>
      </div>

      <div class="divider-wrap">
        <div class="divider-line"></div><span>NEW HERE?</span><div class="divider-line"></div>
      </div>
      <button class="btn-ghost btn-block" style="border:1px solid var(--border); color:var(--text-muted); padding:10px; border-radius:8px; cursor:pointer;" onclick="showAuthTab('register')">Register free →</button>
    </div>

    <!-- Register Form -->
    <div id="register-form" class="hidden">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Ramesh Kumar" />
        </div>
        <div class="form-group">
          <label>Company</label>
          <input type="text" id="reg-company" placeholder="Kumar Contractors" />
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="reg-email" placeholder="aapki@email.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min 6 characters" />
      </div>
      <button class="btn-primary btn-block" onclick="App.auth.register()">Create Free Account</button>
      
      <div class="divider-wrap">
        <div class="divider-line"></div><span>ALREADY JOINED?</span><div class="divider-line"></div>
      </div>
      <button class="btn-ghost btn-block" style="border:1px solid var(--border); color:var(--text-muted); padding:10px; border-radius:8px; cursor:pointer;" onclick="showAuthTab('login')">Login to account →</button>
    </div>
  </div>
</div>

<!-- ══════════════ MAIN APP ══════════════ -->
<div id="app" class="hidden">
  <aside id="sidebar">
    <div class="sidebar-logo"><h1>💰 PayDost</h1></div>
    <nav class="nav-links">
      <button class="nav-item active" data-page="dashboard" onclick="App.navigate('dashboard')">📊 Dashboard</button>
      <button class="nav-item" data-page="projects" onclick="App.navigate('projects')">📁 Projects</button>
      <button class="nav-item" data-page="payments" onclick="App.navigate('payments')">💳 Payments</button>
      <button class="nav-item" data-page="tally" onclick="App.navigate('tally')">📈 Tally</button>
      <button class="nav-item" data-page="diary" onclick="App.navigate('diary')">📔 Site Diary</button>
      <button class="nav-item" data-page="settings" onclick="App.navigate('settings')">⚙️ Settings</button>
    </nav>
    <div style="padding:20px; border-top:1px solid var(--border);">
      <div id="sidebar-name" style="font-weight:700;">My Company</div>
      <button onclick="App.auth.logout()" style="margin-top:10px; width:100%; cursor:pointer;">Logout</button>
    </div>
  </aside>

  <div id="main">
    <div class="top-bar"><h2 id="page-title">Dashboard</h2></div>
    <div id="page-dashboard" class="page-content">
      <div id="stats-grid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px;"></div>
    </div>
    <div id="page-projects" class="page-content hidden"></div>
    <div id="page-payments" class="page-content hidden"></div>
    <div id="page-tally" class="page-content hidden"></div>
    <div id="page-diary" class="page-content hidden"></div>
  </div>
</div>

<!-- Supabase MUST be first -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/app.js"></script>
<script src="/app2.js"></script>
<script src="/app4.js"></script>

<script>
// Tab Switching logic inside HTML for safety
function showAuthTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('login-form').classList.toggle('hidden', !isLogin);
  document.getElementById('register-form').classList.toggle('hidden', isLogin);
  document.getElementById('tab-btn-login').classList.toggle('active', isLogin);
  document.getElementById('tab-btn-register').classList.toggle('active', !isLogin);
}
</script>
</body>
</html>
