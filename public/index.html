<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayDost — Professional Payment Partner</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .hidden { display: none !important; }
    .spinner {
      display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ══════════════ AUTH SCREEN ══════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div style="text-align:center; margin-bottom:32px;">
      <h1 style="margin:0; font-size:32px;">💰 PayDost</h1>
      <p style="color:#028090; font-size:13px; font-weight:700; margin-top:4px;">APKA PAYMENT PARTNER</p>
    </div>

    <div class="auth-tabs" style="display:flex; gap:20px; border-bottom:1px solid rgba(255,255,255,0.1); margin-bottom:24px;">
      <button class="auth-tab active" id="tab-login" onclick="setTab('login')" style="background:none; border:none; color:white; padding:10px 0; cursor:pointer; font-weight:600;">Login</button>
      <button class="auth-tab" id="tab-reg" onclick="setTab('reg')" style="background:none; border:none; color:#64748B; padding:10px 0; cursor:pointer; font-weight:600;">Register</button>
    </div>

    <!-- Login -->
    <div id="form-login">
      <div class="form-group"><label>Email Address</label><input type="email" id="l-email" placeholder="aapki@email.com" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••" /></div>
      <button class="btn-primary" id="btn-login" onclick="handleLogin()">Login to PayDost</button>
      <p style="text-align:center; margin-top:16px; font-size:12px; color:#10B981; font-weight:700;">30 din free — no credit card</p>
    </div>

    <!-- Register -->
    <div id="form-reg" class="hidden">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:15px;">
        <div><label>Full Name</label><input type="text" id="reg-name" /></div>
        <div><label>Company</label><input type="text" id="reg-company" /></div>
      </div>
      <div class="form-group"><label>Email Address</label><input type="email" id="reg-email" placeholder="aapki@email.com" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="reg-password" placeholder="••••••••" /></div>
      <button class="btn-primary" id="btn-register" onclick="handleRegister()">Create Free Account</button>
    </div>
  </div>
</div>

<!-- ══════════════ MAIN APP ══════════════ -->
<div id="app" class="hidden">
  <aside id="sidebar">
    <div class="sidebar-logo">💰 PayDost</div>
    <nav class="nav-links">
      <button class="nav-item active" onclick="App.navigate('dashboard')">📊 Dashboard</button>
      <button class="nav-item" onclick="App.navigate('projects')">📁 Projects</button>
    </nav>
    <div style="padding:24px; border-top:1px solid rgba(255,255,255,0.1);">
      <div id="sidebar-name" style="font-weight:700; color:white; margin-bottom:12px;">My Company</div>
      <button onclick="supabase.auth.signOut().then(()=>location.reload())" style="width:100%; padding:8px; border-radius:6px; background:none; border:1px solid #334466; color:#94A3B8; cursor:pointer;">Logout</button>
    </div>
  </aside>

  <main id="main">
    <div id="alert-area"></div>
    <div id="page-dashboard" class="page-content">
      <div style="margin-bottom:32px;"><h2>Dashboard</h2></div>
      <div id="stats-grid" class="stats-grid"></div>
    </div>
    <div id="page-projects" class="page-content hidden">
      <div style="margin-bottom:32px;"><h2>Projects</h2></div>
      <div id="projects-grid" class="projects-grid"></div>
    </div>
  </main>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
