<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayDost — Apka Payment Partner</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .hidden { display: none !important; }
    #auth-screen { min-height: 100vh; background: #0F172A; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
    .auth-card { background: #1E293B; padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    .auth-tabs { display: flex; gap: 20px; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .auth-tab { background: none; border: none; color: #64748B; padding: 10px 0; cursor: pointer; font-weight: 600; font-size: 15px; position: relative; }
    .auth-tab.active { color: #fff; }
    .auth-tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: #028090; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 12px; color: #94A3B8; margin-bottom: 8px; font-weight: 600; }
    input { width: 100%; padding: 12px; background: #0D1B3E; border: 1px solid #334466; color: white; border-radius: 8px; font-size: 14px; }
    .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, #028090, #1A56A0); border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: 700; }
  </style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div style="text-align:center; margin-bottom:30px;">
      <h1 style="margin:0; font-size:28px;">💰 PayDost</h1>
      <p style="color:#028090; font-size:12px; font-weight:600;">Apka Payment Partner</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="setTab('login')">Login</button>
      <button class="auth-tab" id="tab-reg" onclick="setTab('reg')">Register</button>
    </div>

    <div id="form-login">
      <div class="form-group"><label>Email Address</label><input type="email" id="l-email" placeholder="aapki@email.com" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••" /></div>
      <button class="btn-primary" onclick="doAuth('login')">Login to PayDost</button>
    </div>

    <div id="form-reg" class="hidden">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div class="form-group"><label>Full Name</label><input type="text" id="r-name" /></div>
        <div class="form-group"><label>Company</label><input type="text" id="r-comp" /></div>
      </div>
      <div class="form-group"><label>Email Address</label><input type="email" id="r-email" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="r-pass" /></div>
      <button class="btn-primary" onclick="doAuth('reg')">Create Free Account</button>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <!-- Sidebar and App content will be managed by app.js -->
</div>

<!-- 1. SUPABASE SCRIPT MUST BE FIRST -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 2. BOOTSTRAP SCRIPT -->
<script>
  // Check if Supabase loaded
  if (typeof window.supabase === 'undefined') {
    alert("CRITICAL: Supabase library failed to load. Please check your internet connection!");
  }

  const S_URL = "https://jwtjnrbwwjwtaukaoeda.supabase.co";
  const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3dGpucmJ3d2p3dGF1a2FvZWRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTE0ODEsImV4cCI6MjA5MjU4NzQ4MX0.diAAnRtaTCw9BvHMW3AFE2l4d_B9er2yRLN5sYLdawo";
  const sb = window.supabase.createClient(S_URL, S_KEY);

  function setTab(t) {
    const isL = t === 'login';
    document.getElementById('form-login').classList.toggle('hidden', !isL);
    document.getElementById('form-reg').classList.toggle('hidden', isL);
    document.getElementById('tab-login').classList.toggle('active', isL);
    document.getElementById('tab-reg').classList.toggle('active', !isL);
  }

  async function doAuth(type) {
    if(type==='login') {
      const email = document.getElementById('l-email').value;
      const pass = document.getElementById('l-pass').value;
      const { error } = await sb.auth.signInWithPassword({ email, password: pass });
      if(error) alert("Email ya password galat hai");
    } else if(type==='reg') {
      const email = document.getElementById('r-email').value;
      const pass = document.getElementById('r-pass').value;
      const { error } = await sb.auth.signUp({ 
        email, password: pass,
        options: { data: { full_name: document.getElementById('r-name').value, company_name: document.getElementById('r-comp').value } }
      });
      if(error) alert(error.message);
      else alert("Registration successful! Aap dashboard pe jaa rahe hain.");
    }
  }

  // Session handler
  sb.auth.onAuthStateChange((ev, sess) => {
    if(sess) {
      document.getElementById('auth-screen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      if (window.App && window.App.init) window.App.init();
    }
  });
</script>

<!-- 3. OTHER SCRIPTS LAST -->
<script src="app.js"></script>
<script src="app2.js"></script>
<script src="app4.js"></script>
</body>
</html>
