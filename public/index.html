<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayDost — Professional Payment Partner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ══════════════ AUTH SCREEN ══════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div style="text-align:center; margin-bottom:32px;">
      <h1 style="margin:0; font-size:32px;">💰 PayDost</h1>
      <p style="color:#028090; font-size:12px; font-weight:700; margin-top:4px;">APKA PAYMENT PARTNER</p>
    </div>

    <div class="auth-tabs" style="display:flex; gap:20px; border-bottom:1px solid rgba(255,255,255,0.1); margin-bottom:24px;">
      <button class="auth-tab active" id="tab-login" onclick="setTab('login')" style="background:none; border:none; color:white; padding:10px 0; cursor:pointer; font-weight:600; border-bottom:2px solid #028090;">Login</button>
      <button class="auth-tab" id="tab-reg" onclick="setTab('reg')" style="background:none; border:none; color:#64748B; padding:10px 0; cursor:pointer; font-weight:600;">Register</button>
    </div>

    <div id="form-login">
      <div class="form-group"><label>Email Address</label><input type="email" id="l-email" placeholder="aapki@email.com" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••" /></div>
      <button class="btn-primary" onclick="doAuth('login')" style="width:100%;">Login to PayDost</button>
      <p style="text-align:center; margin-top:16px; font-size:12px; color:#10B981; font-weight:700;">30 din free — no credit card</p>
    </div>

    <div id="form-reg" class="hidden">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:15px;">
        <div><label>Full Name</label><input type="text" id="r-name" /></div>
        <div><label>Company</label><input type="text" id="r-comp" /></div>
      </div>
      <div class="form-group"><label>Email Address</label><input type="email" id="r-email" placeholder="aapki@email.com" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="r-pass" placeholder="••••••••" /></div>
      <button class="btn-primary" onclick="doAuth('reg')" style="width:100%;">Create Free Account</button>
    </div>
  </div>
</div>

<!-- ══════════════ MAIN APP (FULL STRUCTURE) ══════════════ -->
<div id="app" class="hidden">
  <aside id="sidebar">
    <div class="sidebar-logo">💰 PayDost</div>
    <nav class="nav-links">
      <button class="nav-item active" id="nav-dashboard" onclick="App.navigate('dashboard')">📊 Dashboard</button>
      <button class="nav-item" id="nav-projects" onclick="App.navigate('projects')">📁 Projects</button>
    </nav>
    <div style="padding:24px; border-top:1px solid rgba(255,255,255,0.1);">
      <div id="sidebar-name" style="font-weight:700; color:white; margin-bottom:12px;">My Company</div>
      <button onclick="sb.auth.signOut().then(()=>location.reload())" style="width:100%; padding:8px; border-radius:6px; background:none; border:1px solid #334466; color:#94A3B8; cursor:pointer;">Logout</button>
    </div>
  </aside>

  <main id="main">
    <div id="alert-area"></div>
    
    <div id="page-dashboard" class="page-content">
      <div style="margin-bottom:32px;"><h2>Dashboard</h2></div>
      <div id="stats-grid" class="stats-grid"></div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px;">
        <div class="stat-card"><h3>Recent Updates</h3><div id="recent-list"></div></div>
        <div class="stat-card"><h3>Urgent Tasks</h3><div id="urgent-list"></div></div>
      </div>
    </div>

    <div id="page-projects" class="page-content hidden">
      <div style="display:flex; justify-content:space-between; margin-bottom:32px;">
        <h2>Projects</h2>
        <button class="btn-primary" onclick="alert('Coming soon!')">+ Add Project</button>
      </div>
      <div id="projects-grid" class="projects-grid"></div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
const sb = window.supabase.createClient("https://jwtjnrbwwjwtaukaoeda.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3dGpucmJ3d2p3dGF1a2FvZWRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTE0ODEsImV4cCI6MjA5MjU4NzQ4MX0.diAAnRtaTCw9BvHMW3AFE2l4d_B9er2yRLN5sYLdawo");

function setTab(t) {
  const isL = t === 'login';
  document.getElementById('form-login').classList.toggle('hidden', !isL);
  document.getElementById('form-reg').classList.toggle('hidden', isL);
  document.getElementById('tab-login').classList.toggle('active', isL);
  document.getElementById('tab-reg').classList.toggle('active', !isL);
}

async function doAuth(type) {
  if(type==='login') {
    const { error } = await sb.auth.signInWithPassword({ email: document.getElementById('l-email').value, password: document.getElementById('l-pass').value });
    if(error) alert("Email ya password galat hai");
  } else {
    const { error } = await sb.auth.signUp({ 
      email: document.getElementById('r-email').value, 
      password: document.getElementById('r-pass').value,
      options: { data: { full_name: document.getElementById('r-name').value, company_name: document.getElementById('r-comp').value } }
    });
    if(error) alert(error.message);
    else alert("Success! Refresh and Login now.");
  }
}

sb.auth.onAuthStateChange((ev, sess) => {
  if(sess) {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    if(window.App && window.App.init) window.App.init();
  }
});
</script>
</body>
</html>
