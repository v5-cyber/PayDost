services:
  - type: web
    name: paydost
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: paydost-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 24.0.0
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/paydost.db
